name: Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & release debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web bundle + Capacitor sync
        run: npm run cap:sync

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare release artifact
        id: artifact
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          NAME="logogames-build-${{ github.run_number }}-${SHORT_SHA}.apk"
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk "out/${NAME}"
          {
            echo "name=${NAME}"
            echo "tag=build-${{ github.run_number }}"
            echo "short_sha=${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: out/${{ steps.artifact.outputs.name }}
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifact.outputs.tag }}
          name: Build ${{ github.run_number }} · ${{ steps.artifact.outputs.short_sha }}
          body: |
            Автосборка из коммита [`${{ steps.artifact.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            ### Как установить
            1. Скачайте `.apk` ниже на Android-устройство.
            2. Разрешите установку из неизвестных источников (Настройки → Безопасность).
            3. Откройте файл — приложение установится как обычное.

            > Сборка отладочная (debug). Для Google Play нужна подписанная release-сборка с собственным keystore.
          files: out/*.apk
          fail_on_unmatched_files: true
          make_latest: true
