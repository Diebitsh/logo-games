<section class="games-list">
  <header class="list-header">
    <div>
      <h1>Полка игр</h1>
      <span class="crumbs" *ngIf="isShowNestedThemes && !activeTheme">по группам звуков</span>
      <span class="crumbs" *ngIf="!isShowNestedThemes && !activeTheme">по лексическим темам</span>
    </div>
    <button class="lg-btn" type="button" *ngIf="activeTheme || isShowNestedThemes" (click)="goBack()">
      <i class="fi fi-rr-arrow-left"></i> Назад
    </button>
  </header>

  <ul class="theme-grid" *ngIf="!activeTheme && !isShowNestedThemes">
    <li
      class="theme-card"
      *ngFor="let theme of themes"
      [class.active]="theme.isActive"
      (click)="showGamesByTheme(theme)"
    >
      <i [class]="'fi ' + theme.icon"></i>
      <h2>{{ theme.name }}</h2>
    </li>
    <li class="theme-card" (click)="showNestedThemes()">
      <i class="fi fi-rr-book-bookmark"></i>
      <h2>Группы звуков</h2>
    </li>
  </ul>

  <ul class="theme-grid" *ngIf="isShowNestedThemes && !activeTheme">
    <li
      class="theme-card"
      *ngFor="let theme of nestedThemes"
      [class.active]="theme.isActive"
      (click)="showGamesByTheme(theme)"
    >
      <i [class]="'fi ' + theme.icon"></i>
      <h2>{{ theme.name }}</h2>
    </li>
  </ul>

  <section class="games-section" *ngIf="activeTheme">
    <h2>Игры темы</h2>
    <div class="games-grid" *ngIf="games.length > 0; else emptyTpl">
      <button type="button" class="game-tile" *ngFor="let game of games" (click)="goToGame(game)">
        <span class="icon"><i [class]="'fi ' + (game.icon || 'fi-rr-puzzle-alt')"></i></span>
        <div>
          <h3>{{ game.name }}</h3>
          <p>{{ game.description }}</p>
        </div>
      </button>
    </div>
    <ng-template #emptyTpl>
      <div class="empty">Здесь пока тихо. Соберите игру в конструкторе ✨</div>
    </ng-template>
  </section>
</section>
