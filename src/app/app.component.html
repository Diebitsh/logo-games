<header class="app-header">
  <a routerLink="/main" class="brand" (click)="closeMenu()">
    <span class="brand-mark">L</span>
    <span class="brand-text">Logo<strong>Games</strong></span>
  </a>

  <button
    class="hamburger"
    type="button"
    [class.is-open]="mobileMenuOpen()"
    [attr.aria-expanded]="mobileMenuOpen()"
    aria-label="Меню"
    (click)="toggleMenu()"
  >
    <span></span><span></span><span></span>
  </button>

  <nav class="app-nav" [class.is-open]="mobileMenuOpen()" (click)="closeMenu()">
    <a routerLink="/main" routerLinkActive="active">
      <i class="fi fi-rr-home"></i><span>Главная</span>
    </a>
    <a routerLink="/games" routerLinkActive="active">
      <i class="fi fi-rr-puzzle-alt"></i><span>Игры</span>
    </a>
    <a routerLink="/constructor" routerLinkActive="active">
      <i class="fi fi-rr-wand-magic-sparkles"></i><span>Конструктор</span>
    </a>
    <a routerLink="/my-games" routerLinkActive="active">
      <i class="fi fi-rr-bookmark"></i><span>Мои игры</span>
    </a>
  </nav>
</header>

<main class="app-main">
  <router-outlet></router-outlet>
</main>

<app-accessibility-toolbar></app-accessibility-toolbar>
<app-chat-widget></app-chat-widget>
